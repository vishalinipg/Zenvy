## ============================================================
## render.yaml — ZENVY Render Blueprint
## ============================================================
## Deploy BOTH services from one repo.
## Render will auto-detect this file and create both services.
##
## Backend → Web Service  (root: backend/)
## Frontend → Static Site (root: frontend/)
## ============================================================

services:

  # ── BACKEND: FastAPI ────────────────────────────────────────
  - type: web
    name: zenvy-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OWM_API_KEY
        value: ""          # Optional — get free key at openweathermap.org

  # ── FRONTEND: React + Vite Static Site ─────────────────────
  - type: web
    name: zenvy-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://zenvy-backend.onrender.com   # ← update to your backend URL after deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
